name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fintrack-backend
  GITOPS_REPO: qezman/fintrack-gitops

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Run Prisma migrations in cluster
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws eks update-kubeconfig --name fintrack-dev --region $AWS_REGION
          kubectl delete job prisma-migrate -n fintrack 2>/dev/null || true
          kubectl apply -f - <<JOBEOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: prisma-migrate
            namespace: fintrack
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 3
            template:
              spec:
                restartPolicy: Never
                serviceAccountName: fintrack-backend
                containers:
                  - name: migrate
                    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
                    command: ["npx", "prisma", "migrate", "deploy"]
                    envFrom:
                      - secretRef:
                          name: fintrack-backend-secrets
          JOBEOF
          kubectl wait job/prisma-migrate -n fintrack \
            --for=condition=complete --timeout=120s
          kubectl logs -n fintrack \
            $(kubectl get pod -n fintrack -l job-name=prisma-migrate \
            -o jsonpath='{.items[0].metadata.name}')

      - name: Update image tag in gitops repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GH_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          git config --global user.email "ci@fintrack.dev"
          git config --global user.name "FinTrack CI"
          git clone https://$GH_PAT@github.com/$GITOPS_REPO.git gitops
          cd gitops
          sed -i "s|$ECR_REGISTRY/$ECR_REPOSITORY:.*|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
            manifests/backend/deployment.yaml
          git add manifests/backend/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update backend image to $IMAGE_TAG"
          git push
